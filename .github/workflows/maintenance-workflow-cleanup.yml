---
name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  delete-workflow-runs:
    runs-on: ubuntu-latest

    permissions:
      actions: write

    steps:
      - uses: Mattraks/delete-workflow-runs@0cf693bc9909e5e867ee8f27b813224ba862939c # v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 180
          keep_minimum_runs: 50
