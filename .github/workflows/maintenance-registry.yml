name: maintenance-registry

on:
  schedule:
    - cron: "44 4 * * *"
  workflow_dispatch:

jobs:
  ghcr-cleanup-image:
    runs-on: ubuntu-24.04

    permissions:
      packages: write

    concurrency:
      group: ghcr-cleanup-image

    steps:
      - uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          exclude-tags: main,latest
          older-than: 180 days
          delete-tags: "*"

      - uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          delete-untagged: True
          delete-orphaned-images: True
