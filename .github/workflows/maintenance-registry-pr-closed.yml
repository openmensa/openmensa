name: Cleanup Pull Request Images
on:
  pull_request:
    types: [closed]
jobs:
  ghcr-cleanup-image:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Delete image
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          delete-tags: pr-${{ github.event.pull_request.number }}
