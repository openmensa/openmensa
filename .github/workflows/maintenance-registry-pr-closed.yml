---
name: Cleanup Pull Request Images

on:
  pull_request:
    types: [closed]

jobs:
  ghcr-cleanup-image:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Delete image
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1
        with:
          delete-tags: pr-${{ github.event.pull_request.number }}
